# ============================================================
# Application
# ============================================================
spring.application.name=margin-calculator

# ============================================================
# MSSQL DataSource
# Update host, port, database name and credentials as needed.
# ============================================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=MarginCalculatorDB;encrypt=false;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=YourStrong@Password
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# Server
# ============================================================
server.port=8080

# ============================================================
# Logging
# ============================================================
logging.level.com.margincalculator=DEBUG
logging.level.org.hibernate.SQL=DEBUG
